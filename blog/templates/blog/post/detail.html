{% extends 'blog/base.html' %}
{% block title%} {{ post.title }} {% endblock %}
{% block content%}
    <h2>{{ post.title }}</h2>
    <p class="date">
        Published on {{ post.publish }}  by {{ post.author }}
        <br>
        {{post.body|truncatewords:25}}
    </p>

    <p>
        <a href="{% url 'blog:post_share' post.id %}">
            SHare

        </a>
    </p>
{% endblock %}
